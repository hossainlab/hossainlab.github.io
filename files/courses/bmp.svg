<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="g-essence" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="250" fill="url(#g-essence)" />
  
  <!-- Visual Essence: Mentorship + Bioinformatics -->
  <g transform="translate(200, 125) scale(1.2)">
    <!-- DNA Backdrop -->
    <path d="M-100,-40 Q-60,0 -100,40 M-80,-40 Q-40,0 -80,40 M80,-40 Q40,0 80,40 M100,-40 Q60,0 100,40" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.15" />

    <!-- Mentorship Scene -->
    <g transform="translate(-15, 10)">
      <!-- Mentor -->
      <g transform="translate(-25, 0)">
        <circle cx="0" cy="-25" r="12" fill="#1e40af" />
        <path d="M-18,12 L-12,-12 Q0,-18 12,-12 L18,12 Z" fill="#1e40af" />
        <!-- Guidance gesture -->
        <path d="M10,-5 L45,-15" stroke="#1e40af" stroke-width="5" stroke-linecap="round" />
      </g>
      
      <!-- Mentee -->
      <g transform="translate(30, 8)">
        <circle cx="0" cy="-22" r="10" fill="#3b82f6" />
        <path d="M-15,12 L-10,-10 Q0,-15 10,-10 L15,12 Z" fill="#3b82f6" />
      </g>

      <!-- The Research Insight (The 'Bio' in Bioinformatics) -->
      <g transform="translate(60, -35)">
        <!-- Multi-modal genomic clusters -->
        <circle r="14" fill="#10b981" opacity="0.9" filter="url(#glow)" />
        <circle cx="15" cy="12" r="8" fill="#f59e0b" opacity="0.8" />
        <circle cx="-12" cy="8" r="6" fill="#ef4444" opacity="0.7" />
        <!-- Data connections -->
        <line x1="0" y1="0" x2="15" y2="12" stroke="#fff" stroke-width="1.5" />
        <line x1="0" y1="0" x2="-12" y2="8" stroke="#fff" stroke-width="1.5" />
      </g>
    </g>
  </g>
</svg>