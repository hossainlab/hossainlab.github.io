<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2" />
      <stop offset="100%" stop-color="#ffe4e6" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#g2)" />
  
  <!-- Lung / Alveoli representation -->
  <g transform="translate(200, 110)">
    <!-- Simplified Lung shapes -->
    <path d="M-10,-50 C-60,-50 -80,20 -40,60 C-20,70 0,50 0,20 L0,-50 Z" fill="#f43f5e" opacity="0.2" stroke="#e11d48" stroke-width="2"/>
    <path d="M10,-50 C60,-50 80,20 40,60 C20,70 0,50 0,20 L0,-50 Z" fill="#f43f5e" opacity="0.2" stroke="#e11d48" stroke-width="2"/>
    
    <!-- Cells in lung -->
    <circle cx="-30" cy="10" r="6" fill="#e11d48" />
    <circle cx="30" cy="-10" r="6" fill="#e11d48" />
    <circle cx="10" cy="40" r="4" fill="#e11d48" opacity="0.6" />
  </g>
  
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#9f1239">COVID-19 Lung Atlas</text>
  <text x="200" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Pathology Reanalysis</text>
</svg>