project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.Rmd"
    - "*.md"
    - "!README.md"
    - "!LICENSE.md"
    - "!myresources/"
    - "!renv/"
    - "!certificate*"
    - "projects"
  resources:
    - "files/"
  preview:
    port: 4321
    browser: true
    watch-inputs: false
execute:
  # Re-render only when source changes
  freeze: auto
description-meta: "Personal Website for Md. Jubayer Hossain (Learner, Educator and Data Analyst)"
engine: knitr

website:
  page-navigation: true
  open-graph: true
  twitter-card:
    creator: "@hossainlab"
    image: "/files/img/banner.jpg"
  title: ""
  favicon: /files/profiles/icon.png

  navbar:
      pinned: true
      left:
        - text: "Home"
          file: index.qmd
        - text: "Projects"
          href: research/index.qmd
        - text: "Publications"
          file: publications/index.qmd
        - text: "Talks"
          href: talks/index.qmd
        - text: "Teaching"
          file: teaching/index.qmd
        - text: "Press"
          file: press/index.qmd
        - text: "What I Use"
          file: use/index.qmd
        - text: "More"
          menu:
          - text: "About"
            file: about/index.qmd
          - text: "Blog"
            file: blog/index.qmd
          - text: "Newsletter"
            file: https://hossainlab.substack.com
          - text: "Dashboards"
            href: dashboards.qmd
          - text: "Press"
            file: press/index.qmd
      right:
      - icon: envelope
        aria-label: email
        href: "mailto:hossainmj@gmail.com"
      - text: "{{< ai orcid>}}"
        aria-label: orcid
        href: https://orcid.org/0000-0001-9323-4997
      - text: "{{< ai google-scholar >}}"
        aria-label: google-scholar
        href: https://scholar.google.com/citations?user=9_K4ekoAAAAJ&hl=en&authuser=5
      - text: "{{< ai researchgate >}}"
        aria-label: researchgate
        href: https://scholar.google.com/citations?user=9_K4ekoAAAAJ&hl=en&authuser=5
      - icon: linkedin
        aria-label: linkedin
        href: https://www.linkedin.com/in/hossainmj
      - icon: twitter
        aria-label: twitter
        href: https://twitter.com/JHossain_28
        rel: me
      - icon: github
        aria-label: github
        href: https://github.com/hossainlab
        rel: me
      - icon: youtube
        aria-label: youtube
        href: https://www.youtube.com/@hossainlab
        rel: me
  page-footer: "&copy; Copyright 2024, Md. Jubayer Hossain"
format:
  html:
    theme:
       light: flatly
       dark: darkly
    css: styles.css
    page-layout: full
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    highlight-style: github
