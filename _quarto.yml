project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.Rmd"
    - "*.md"
    - "!README.md"
    - "!LICENSE.md"
    - "!myresources/"
    - "!renv/"
    - "!certificate*"
  resources:
    - "files/"
  preview:
    port: 4321
    browser: true
    watch-inputs: false
execute:
  # Re-render only when source changes
  freeze: auto
description-meta: "Jubayer Hossain's personal website."
engine: knitr


website:
  page-navigation: true
  open-graph: true
  twitter-card: true
  title: ""
  favicon: /files/profiles/favicon-512.png

  page-footer:
    left: "&copy; Copyright 2023, Md. Jubayer Hossain"
    right: "This page is built with ❤️ and [Quarto](https://quarto.org/)."
  navbar:
      pinned: true
      background: "#99ccff"
      logo: /files/logo.png
      left:
        - text: "Home"
          file: index.qmd
        - text: "Blog"
          file: blog/index.qmd
        - text: "Research"
          file: research/index.qmd
        - text: "Talks"
          file: talks/index.qmd
        - text: "Projects"
          file: projects.qmd
        - text: "Resources"
          file: resources.qmd
        - text: "Teaching"
          file: teaching/index.qmd
        - text: "CV"
          file: cv/index.qmd
      right:
      - icon: envelope
        aria-label: email
        href: "mailto:hossainmj@gmail.com"
      - icon: twitter
        aria-label: twitter
        href: https://twitter.com/JHossain_28
        rel: me
      - icon: github
        aria-label: github
        href: https://github.com/hossainlab
        rel: me
      - icon: youtube
        aria-label: youtube
        href: https://www.youtube.com/@hossainlab
        rel: me
      - icon: linkedin
        aria-label: linkedin
        href: https://www.linkedin.com/in/hossainmj

format:
  html:
    theme:
       - html/ath.scss
    css: styles.css
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    highlight-style: monokai
