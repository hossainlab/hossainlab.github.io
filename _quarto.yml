project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.Rmd"
    - "*.md"
    - "!README.md"
    - "!LICENSE.md"
    - "!myresources/"
    - "!renv/"
    - "!certificate*"
    - "!projects_backup"
  resources:
    - "files/"
    - "performance.js"
    - "performance-monitor.js"
    - "sw.js"
  preview:
    port: 4321
    browser: true
    watch-inputs: true
    navigate: true
execute:
  # Re-render only when source changes
  freeze: auto
description-meta: "Personal Website for Md. Jubayer Hossain (Learner, Educator and Data Analyst)"
engine: knitr

website:
  page-navigation: true
  open-graph: true
  twitter-card:
    creator: "@hossainlab"
    image: "/files/img/banner.jpg"
  favicon: /files/profiles/icon.png
  search: false
  navbar:
      pinned: true
      left:
        - text: "Home"
          file: index.qmd
        - text: "About"
          file: about/index.qmd
        - text: "Research"
          file: research/index.qmd
        - text: "Publications"
          file: publications/index.qmd
        - text: "Teaching"
          file: teaching/index.qmd
        - text: "Talks"
          href: talks/index.qmd
        - text: "Press"
          file: press/index.qmd
        - text: "More"
          menu:
          - text: "Blog"
            file: blog/index.qmd
          - text: "Newsletter"
            file: https://hossainlab.substack.com
          - text: "Dashboards"
            href: dashboards.qmd
          - text: "What I Use"
            file: use/index.qmd
      right:
      - icon: envelope
        aria-label: email
        href: "mailto:hossainmj@gmail.com"
      - text: "{{< ai orcid >}}"
        aria-label: orcid
        href: https://orcid.org/0000-0001-9323-4997
      - text: "{{< ai google-scholar >}}"
        aria-label: google-scholar
        href: https://scholar.google.com/citations?user=9_K4ekoAAAAJ&hl=en&authuser=5
      - text: "{{< ai researchgate >}}"
        aria-label: researchgate
        href: https://scholar.google.com/citations?user=9_K4ekoAAAAJ&hl=en&authuser=5
      - icon: linkedin
        aria-label: linkedin
        href: https://www.linkedin.com/in/hossainmj
      - icon: twitter
        aria-label: twitter
        href: https://twitter.com/JHossain_28
        rel: me
      - icon: github
        aria-label: github
        href: https://github.com/hossainlab
        rel: me
      - icon: youtube
        aria-label: youtube
        href: https://www.youtube.com/@hossainlab
        rel: me
  page-footer: "&copy; Copyright 2024, Md. Jubayer Hossain"
format:
  html:
    theme: cosmo
    css:
      - styles.css
      - performance.css
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link rel="dns-prefetch" href="//fonts.googleapis.com">
          <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
          <meta name="theme-color" content="#3b82f6">
          <meta name="color-scheme" content="light dark">
    include-before-body:
      - text: |
          <script>
            // Critical performance script - inline for best performance
            document.documentElement.style.setProperty('--viewport-height', window.innerHeight + 'px');
            window.addEventListener('resize', () => {
              document.documentElement.style.setProperty('--viewport-height', window.innerHeight + 'px');
            });
          </script>
    include-after-body:
      - text: |
          <script src="performance.js" defer></script>
          <script src="performance-monitor.js" defer></script>
          <script>
            // Service Worker registration for caching
            if ('serviceWorker' in navigator) {
              window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
              });
            }

            // Performance optimization hints
            document.addEventListener('DOMContentLoaded', () => {
              // Add loading class for smooth transitions
              document.body.classList.add('loading-complete');

              // Optimize critical images
              const criticalImages = document.querySelectorAll('img[src*="icon.png"], img[src*="banner.jpg"]');
              criticalImages.forEach(img => {
                img.loading = 'eager';
                img.decoding = 'sync';
              });
            });
          </script>
    page-layout: full
    toc: false
    toc-location: right
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    highlight-style: github
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: false
