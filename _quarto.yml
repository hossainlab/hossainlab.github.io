project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.Rmd"
    - "*.md"
    - "!README.md"
    - "!LICENSE.md"
    - "!myresources/"
    - "!renv/"
    - "!certificate*"
  resources:
    - "files/"
  preview:
    port: 4321
    browser: true
    watch-inputs: false
execute:
  # Re-render only when source changes
  freeze: auto
description-meta: "Andreas Handel's personal website."
engine: knitr


website:
  page-navigation: true
  title: ""
  favicon: /files/profiles/favicon-512.png

  page-footer:
    left: "&copy; Copyright 2022, Md. Jubayer Hossain"
    right: "This page is built with ❤️ and [Quarto](https://quarto.org/)."
  navbar:
      background: "#99ccff"
      logo: /files/logo.png
      left:
        - text: "Home"
          file: index.qmd
        - text: "About"
          file: about.qmd
        - text: "CV"
          file: cv/index.qmd
        - text: "Blog"
          file: blog/index.qmd
        - text: "Publications"
          file: publications.qmd
        - text: "Talks"
          file: talks/index.qmd
        - text: "Projects"
          file: projects/index.qmd
        - text: "Resources"
          file: resources.qmd
        - text: "Teaching"
          file: teaching/index.qmd
      right:
      - icon: rss
        aria-label: rss
        href: atom.xml
      - icon: envelope
        aria-label: email
        href: "mailto:aheiss@gsu.edu"
      - icon: twitter
        aria-label: twitter
        href: https://twitter.com/andrewheiss
        rel: me
      - icon: mastodon
        aria-label: mastodon
        href: https://fediscience.org/users/andrew/
        rel: me
      - icon: github
        aria-label: github
        href: https://github.com/andrewheiss
        rel: me
      - icon: youtube
        aria-label: youtube
        href: https://www.youtube.com/andrewheiss
        rel: me
      - icon: postage-heart-fill
        aria-label: family
        href: https://www.heissatopia.com/
      - icon: linkedin
        aria-label: linkedin
        href: https://www.linkedin.com/in/andrewheiss

format:
  html:
    theme:
       - html/ath.scss
    css: styles.css
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    highlight-style: monokai
