  # --- Teaching Philosophy ---
  philosophy_statement: >
    My teaching philosophy is rooted in the belief that computational skills should
    be accessible to every biologist and health researcher — regardless of their
    programming background. I design learning experiences that are hands-on, inquiry-driven,
    and grounded in real biological problems. By connecting abstract concepts to
    tangible datasets and clinical questions, I help students build not just technical
    competence but scientific confidence. I continuously adapt my methods based on
    student feedback, ensuring that each cohort receives a current, relevant, and
    inclusive learning experience.

  philosophy_principles:
    - icon: "🔬"
      title: "Real-World Problem Orientation"
      description: >
        Every concept is introduced through a concrete biological or clinical problem.
        Students learn DESeq2 by analysing actual cancer RNA-seq data, not toy examples.
        This approach sustains motivation and builds transferable analytical intuition.
    - icon: "🤝"
      title: "Inclusive & Accessible Learning"
      description: >
        I design courses that assume no prior programming experience. Step-by-step
        scaffolding, bilingual explanations, and flexible pacing ensure students from
        diverse backgrounds — wet-lab biologists, clinicians, public health professionals —
        can thrive alongside computational experts.
    - icon: "🔄"
      title: "Iterative Feedback & Reflection"
      description: >
        I collect structured feedback after every session and course cohort.
        Student evaluations directly shape the next iteration of my curriculum,
        keeping content current and pedagogically sound.
    - icon: "🛠️"
      title: "Reproducible & Open Science"
      description: >
        All course materials — code, notebooks, datasets, and slides — are made
        freely available on GitHub. I teach students to document their workflows
        using R Markdown and Jupyter, embedding reproducibility as a scientific habit.
    - icon: "🎯"
      title: "Goal-Aligned Curriculum Design"
      description: >
        Courses are structured around learning outcomes mapped to real career goals:
        publishing a bioinformatics paper, analysing a dissertation dataset, or
        transitioning into computational research. Every session connects to a
        tangible milestone.

