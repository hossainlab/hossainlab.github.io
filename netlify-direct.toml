# Alternative netlify.toml for direct Quarto installation
# Use this if build.sh fails

[build]
  # Direct build command without custom script
  command = "curl -s https://quarto.org/download/latest/quarto-linux-amd64.tar.gz | tar -xzf - && export PATH=\"$(find . -name 'quarto' -type f | head -1 | xargs dirname):$PATH\" && quarto render"

  # Output directory (where the rendered site is)
  publish = "docs"

  # Environment variables for build
  [build.environment]
    QUARTO_DENO = "true"
    QUARTO_DENO_V8_OPTIONS = "--max-heap-size=3000"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Redirect rules
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404