bmp:
  title: Program Lead & Mentor
  location: Dhaka, Bangladesh
  date: 2026 – Present
  description: "Bioinformatics Mentorship Program (BMP) | mdjubayerhossain.com/bmp"
  details:
    - Leads a 12-week intensive scientific capacity building program (7 mentees/cohort) training early-career researchers in reproducible RNA-seq analysis in cancer genomics.
    - Standardizes Open Science practices across each cohort — version-controlled code (Git/GitHub), containerized environments (Docker/Singularity), and fully documented pipelines — instilling a computational culture that researchers carry into their own labs and projects.
    - Mentees produce manuscript-ready, reproducible research outputs; multiple projects are progressing to peer-reviewed publication.

gsa_internship:
  title: Program Lead & Mentor
  location: Dhaka, Bangladesh
  date: July 2025 – Dec 2025
  description: "GSA Bioinformatics Internship | gsabioinfointernship.owlstown.net"
  details:
    - Scientific capacity building initiative across GNOBB, ASI School of Life, and SPSB (5 mentees), embedding reproducible bioinformatics competency directly into institutional research workflows.
    - Interns access the GNOBB-ASI Bioinformatics Hub to conduct RNA-Seq, multi-omics, and systems biology analyses under structured mentorship from DeepBio Limited, Big Bioinformatics Lab, and CHIRAL Bangladesh.
