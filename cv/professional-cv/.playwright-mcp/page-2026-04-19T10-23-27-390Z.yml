        - strong [ref=e76]: About Me
      - paragraph [ref=e77]:
        - generic [ref=e78]:
          - text: Computational biologist and bioinformatician specializing in multi-omics data analysis, reproducible pipeline development, and AI-driven biomarker discovery in cancer and neurological diseases. Founder of CHIRAL Bangladesh (non-profit research institute) and DeepBio Limited (bioinformatics research group), with 18+ peer-reviewed publications in Q1/Q2 journals including
          - emphasis [ref=e79]: Scientific Reports
          - text: ","
          - emphasis [ref=e80]: BMC Genomics
          - text: ","
          - emphasis [ref=e81]: Lancet Oncology
          - text: ", and"
          - emphasis [ref=e82]: Lancet Neurology
          - text: . GBD Senior Collaborator at IHME (University of Washington) and Nextflow Ambassador (Seqera). Trained 3,000+ early-career researchers across Bangladesh in computational biology and data science.
    - generic [ref=e83]:
      - heading "Research Statement" [level=3] [ref=e84]:
        - strong [ref=e85]: Research Statement
      - paragraph [ref=e86]:
        - text: "I am a computational biologist with a track record of building and deploying reproducible multi-omics frameworks to decode the molecular architecture of cancer and neurological diseases. My research addresses three interconnected questions: (1) How can integrative analysis of bulk RNA-seq, single-cell RNA-seq, and spatial transcriptomics identify robust immunological biomarkers and therapeutic targets within tumor microenvironments? (2) Can interpretable machine learning models trained on pan-cancer transcriptomic data reliably stratify patient prognosis and predict immunotherapy response? (3) What computational strategies best characterize dynamic cell-state transitions — such as tumor-associated macrophage reprogramming and microglial activation in neurodegeneration? My published work includes first- and corresponding-author pan-cancer analyses in"
        - emphasis [ref=e87]: Scientific Reports
        - text: and
        - emphasis [ref=e88]: BMC Genomics
        - text: ", six GitHub-hosted reproducible pipelines built on Nextflow, Docker, and nf-core standards, and GBD consortium contributions published in"
        - emphasis [ref=e89]: The Lancet
        - text: family. My long-term goal is to develop scalable, interpretable computational methods for cell-state inference and immune landscape modeling, translating multi-omics discoveries into clinically actionable biomarkers and therapeutic hypotheses.
