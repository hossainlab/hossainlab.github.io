courses:
  - course_id: "BIOS 7060"
    title: "Applied Machine Learning for Healthcare"
    type: "Course"
    learning_outcomes: "Learn to apply machine learning techniques to healthcare data, including supervised and unsupervised learning, deep learning, and model validation in clinical settings."
    syllabus: "https://github.com/hossainlab/applied-ml-healthcare"
    slides: "https://github.com/hossainlab/applied-ml-healthcare/tree/main/slides"
    code_repo: "https://github.com/hossainlab/applied-ml-healthcare"

  - course_id: "BIOS 6050"
    title: "Foundations of Health Data Science"
    type: "Course"
    learning_outcomes: "Master fundamental concepts in health data science including data management, statistical analysis, visualization, and reproducible research practices."
    syllabus: "https://github.com/hossainlab/health-data-science"
    slides: "https://github.com/hossainlab/health-data-science/tree/main/lectures"
    code_repo: "https://github.com/hossainlab/health-data-science"

  - course_id: "BINF 7020"
    title: "Bioinformatics Bootcamp"
    type: "Workshop"
    learning_outcomes: "Intensive hands-on training in bioinformatics tools and techniques, covering sequence analysis, genomics, and computational biology workflows."
    syllabus: "https://github.com/hossainlab/bioinformatics-bootcamp"
    slides: "https://github.com/hossainlab/bioinformatics-bootcamp/tree/main/materials"
    code_repo: "https://github.com/hossainlab/bioinformatics-bootcamp"

  - course_id: "STAT 5530"
    title: "Data Analysis with R"
    type: "Course"
    learning_outcomes: "Comprehensive introduction to data analysis using R, covering data manipulation, statistical modeling, and visualization for research applications."
    syllabus: "https://github.com/hossainlab/data-analysis-r"
    slides: "https://github.com/hossainlab/data-analysis-r/tree/main/slides"
    code_repo: "https://github.com/hossainlab/data-analysis-r"

  - course_id: "BINF 6010"
    title: "R for Bioinformatics"
    type: "Course"
    learning_outcomes: "Learn to use R for bioinformatics applications including sequence analysis, phylogenetics, and biological data visualization."
    syllabus: "https://github.com/hossainlab/r-bioinformatics"
    slides: "https://github.com/hossainlab/r-bioinformatics/tree/main/lectures"
    code_repo: "https://github.com/hossainlab/r-bioinformatics"

  - course_id: "BINF 7030"
    title: "Machine Learning for Bioinformatics"
    type: "Course"
    learning_outcomes: "Apply machine learning methods to biological problems including protein structure prediction, gene expression analysis, and drug discovery."
    syllabus: "https://github.com/hossainlab/ml-bioinformatics"
    slides: "https://github.com/hossainlab/ml-bioinformatics/tree/main/slides"
    code_repo: "https://github.com/hossainlab/ml-bioinformatics"

  - course_id: "BIOS 5040"
    title: "Python for Health Data Analysis"
    type: "Course"
    learning_outcomes: "Master Python programming for health data analysis including pandas, numpy, scikit-learn, and healthcare-specific libraries."
    syllabus: "https://github.com/hossainlab/python-health-data"
    slides: "https://github.com/hossainlab/python-health-data/tree/main/lectures"
    code_repo: "https://github.com/hossainlab/python-health-data"

  - course_id: "GIS 6020"
    title: "Python for Geospatial Health Data Science"
    type: "Workshop"
    learning_outcomes: "Learn to analyze geospatial health data using Python, including mapping disease patterns, spatial statistics, and environmental health applications."
    syllabus: "https://github.com/hossainlab/geospatial-health-python"
    slides: "https://github.com/hossainlab/geospatial-health-python/tree/main/materials"
    code_repo: "https://github.com/hossainlab/geospatial-health-python"

  - course_id: "BINF 8010"
    title: "RNA-seq Data Analysis with R"
    type: "Workshop"
    learning_outcomes: "Comprehensive workflow for RNA-seq analysis including quality control, differential expression, pathway analysis, and visualization."
    syllabus: "https://github.com/hossainlab/rnaseq-analysis-r"
    slides: "https://github.com/hossainlab/rnaseq-analysis-r/tree/main/slides"
    code_repo: "https://github.com/hossainlab/rnaseq-analysis-r"

  - course_id: "BINF 8020"
    title: "Single-cell RNA-seq Analysis with R"
    type: "Workshop"
    learning_outcomes: "Advanced techniques for single-cell RNA-seq analysis including clustering, trajectory analysis, and cell type identification."
    syllabus: "https://github.com/hossainlab/scrnaseq-analysis-r"
    slides: "https://github.com/hossainlab/scrnaseq-analysis-r/tree/main/materials"
    code_repo: "https://github.com/hossainlab/scrnaseq-analysis-r"

  - course_id: "BIOS 6070"
    title: "Building Dashboards with R"
    type: "Workshop"
    learning_outcomes: "Create interactive dashboards and web applications using R Shiny, plotly, and other visualization tools for health data."
    syllabus: "https://github.com/hossainlab/r-dashboards"
    slides: "https://github.com/hossainlab/r-dashboards/tree/main/materials"
    code_repo: "https://github.com/hossainlab/r-dashboards"

  - course_id: "BINF 8030"
    title: "TCGA Data Analysis with R"
    type: "Workshop"
    learning_outcomes: "Access and analyze cancer genomics data from The Cancer Genome Atlas using R and Bioconductor packages."
    syllabus: "https://github.com/hossainlab/tcga-analysis-r"
    slides: "https://github.com/hossainlab/tcga-analysis-r/tree/main/slides"
    code_repo: "https://github.com/hossainlab/tcga-analysis-r"

  - course_id: "STAT 5010"
    title: "gtsummary for Public Health"
    type: "Seminar"
    learning_outcomes: "Master the gtsummary R package for creating publication-ready summary tables and statistical reports in public health research."
    syllabus: "https://github.com/hossainlab/gtsummary-public-health"
    slides: "https://github.com/hossainlab/gtsummary-public-health/tree/main/materials"
    code_repo: "https://github.com/hossainlab/gtsummary-public-health"

  - course_id: "STAT 4020"
    title: "R for Research"
    type: "Course"
    learning_outcomes: "Comprehensive R programming course focused on research applications, reproducible research, and advanced statistical analysis."
    syllabus: "https://github.com/hossainlab/r-for-research"
    slides: "https://github.com/hossainlab/r-for-research/tree/main/lectures"
    code_repo: "https://github.com/hossainlab/r-for-research"

  - course_id: "STAT 3010"
    title: "SPSS for Health Sciences"
    type: "Course"
    learning_outcomes: "Learn statistical analysis using SPSS with focus on health sciences applications including descriptive statistics, hypothesis testing, and regression analysis."
    syllabus: "https://github.com/hossainlab/spss-health-sciences"
    slides: "https://github.com/hossainlab/spss-health-sciences/tree/main/materials"
    code_repo: "https://github.com/hossainlab/spss-health-sciences"