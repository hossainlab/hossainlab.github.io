# Freeze computed outputs
freeze: auto

# Enable banner style title blocks
title-block-banner: true

# Default for table of contents
toc: true
toc-title: Table of contents
toc-location: left
toc-depth: 3

page-layout: article

# Default knitr options
execute:
  echo: true
  message: true
  warning: true

# Default fields for citation
citation: true

comments:
  utterances:
    repo: hossainlab/hossainlab.github.io

# Default author
author:
  - name: Md. Jubayer Hossain
    url: https://hossainlab.github.io/
    orcid: 0000-0001-9323-4997
