<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f3ff" />
      <stop offset="100%" stop-color="#ede9fe" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#g6)" />
  
  <!-- Spatial grid / cells -->
  <g transform="translate(200, 100)">
    <rect x="-60" y="-50" width="120" height="100" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2,2" />
    
    <!-- Spatial spots -->
    <circle cx="-40" cy="-30" r="6" fill="#8b5cf6" />
    <circle cx="-20" cy="-30" r="6" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="0" cy="-30" r="6" fill="#ec4899" />
    
    <circle cx="-40" cy="-10" r="6" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-20" cy="-10" r="6" fill="#ec4899" />
    <circle cx="0" cy="-10" r="6" fill="#ec4899" opacity="0.7"/>
    
    <circle cx="-40" cy="10" r="6" fill="#10b981" />
    <circle cx="-20" cy="10" r="6" fill="#10b981" opacity="0.5"/>
  </g>
  
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5b21b6">Spatial-scRNA-seq Atlas</text>
  <text x="200" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Immunotherapy Resistance</text>
