<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#dcfce7" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#g1)" />
  
  <!-- Pill / Drug Icon -->
  <g transform="translate(200, 100)">
    <!-- Bacteria representation (background) -->
    <path d="M-60,-20 C-80,-40 -100,20 -80,60 C-60,80 -20,90 20,60 C40,40 50,0 20,-30 C0,-40 -40,-30 -60,-20" fill="#10b981" opacity="0.1" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,2"/>
    
    <!-- Capsule -->
    <g transform="rotate(-45)">
      <rect x="-40" y="-15" width="40" height="30" rx="15" fill="#ef4444" />
      <rect x="0" y="-15" width="40" height="30" rx="15" fill="#ffffff" stroke="#ef4444" stroke-width="1" />
    </g>
    
    <!-- Deep Learning / AI connection dots -->
    <circle cx="60" cy="-40" r="5" fill="#3b82f6" />
    <circle cx="80" cy="10" r="5" fill="#3b82f6" />
    <circle cx="50" cy="50" r="5" fill="#3b82f6" />
    <line x1="0" y1="0" x2="60" y2="-40" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="0" x2="80" y2="10" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="0" x2="50" y2="50" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
  </g>
  
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#065f46">AMR Drug Repurposing</text>
  <text x="200" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#047857">Deep Learning-Driven Discovery</text>
</svg>