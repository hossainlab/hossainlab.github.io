<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="gc5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#gc5)" />
  
  <!-- Drug Discovery Motif -->
  <g transform="translate(200, 110)">
    <!-- Molecule / Capsule icon -->
    <rect x="-40" y="-20" width="80" height="40" rx="20" fill="#ea580c" opacity="0.3" stroke="#ea580c" stroke-width="2" />
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#ea580c" stroke-width="2" />
    
    <!-- AI atoms -->
    <circle cx="-50" cy="-40" r="8" fill="#c2410c" />
    <circle cx="50" cy="40" r="8" fill="#c2410c" />
    <line x1="-50" y1="-40" x2="-20" y2="-10" stroke="#c2410c" stroke-width="1.5" />
    <line x1="50" y1="40" x2="20" y2="10" stroke="#c2410c" stroke-width="1.5" />
  </g>
  
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7c2d12">AI in Drug Discovery</text>
  <text x="200" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">In Silico Toxicology Modeling</text>
