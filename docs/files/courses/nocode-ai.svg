<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="g-nocode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdfa" />
      <stop offset="100%" stop-color="#ccfbf1" />
    </linearGradient>
    <filter id="ai-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="250" fill="url(#g-nocode)" />
  
  <!-- Visual Essence: AI + Life Sciences (No Code) -->
  <g transform="translate(200, 125) scale(1.1)">
    <!-- DNA Spiral Backdrop -->
    <path d="M-90,-50 Q-50,0 -90,50 M-70,-50 Q-30,0 -70,50" stroke="#0d9488" stroke-width="3" fill="none" opacity="0.2" />
    <path d="M90,-50 Q50,0 90,50 M70,-50 Q30,0 70,50" stroke="#0d9488" stroke-width="3" fill="none" opacity="0.2" />

    <!-- Central AI Agent / Brain Motif -->
    <g transform="translate(0, 0)">
      <!-- AI 'Neural' Core -->
      <circle r="40" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#ai-glow)" />
      
      <!-- Connective Nodes (No-Code interaction) -->
      <circle cx="-15" cy="-15" r="5" fill="#0d9488" />
      <circle cx="15" cy="-15" r="5" fill="#0d9488" />
      <circle cx="0" cy="15" r="6" fill="#14b8a6" />
      
      <line x1="-15" y1="-15" x2="0" y2="15" stroke="#0d9488" stroke-width="1.5" />
      <line x1="15" y1="-15" x2="0" y2="15" stroke="#0d9488" stroke-width="1.5" />
      <line x1="-15" y1="-15" x2="15" y2="-15" stroke="#0d9488" stroke-width="1.5" />
      
      <!-- Floating 'Life Science' molecules being processed -->
      <g transform="translate(45, -35)">
         <circle r="8" fill="#f59e0b" opacity="0.8" />
         <path d="M-5,0 L5,0 M0,-5 L0,5" stroke="#fff" stroke-width="1.5" />
      </g>
      <g transform="translate(-45, 30)">
         <circle r="10" fill="#3b82f6" opacity="0.7" />
         <circle cx="0" cy="0" r="4" fill="#fff" opacity="0.5" />
      </g>
    </g>
    
    <!-- Automation Gears (Stylized as circular dots) -->
    <g opacity="0.5">
       <circle cx="-60" cy="-20" r="3" fill="#0f766e" />
       <circle cx="-50" cy="-40" r="3" fill="#0f766e" />
       <circle cx="60" cy="20" r="3" fill="#0f766e" />
       <circle cx="50" cy="40" r="3" fill="#0f766e" />
    </g>
  </g>
</svg>