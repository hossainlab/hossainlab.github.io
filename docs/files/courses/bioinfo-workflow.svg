<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="gc7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#gc7)" />
  
  <!-- Workflow / Pipeline Motif -->
  <g transform="translate(200, 110)">
    <!-- Connected steps -->
    <rect x="-100" y="-30" width="40" height="40" rx="8" fill="#334155" />
    <path d="M-60,-10 L-40,-10" stroke="#64748b" stroke-width="3" stroke-dasharray="4,2" />
    
    <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#2563eb" />
    <path d="M30,0 L50,0" stroke="#64748b" stroke-width="3" />
    
    <rect x="60" y="-30" width="40" height="40" rx="8" fill="#334155" />
    
    <!-- Container / Docker icon simplified -->
    <rect x="-15" y="-15" width="30" height="30" fill="none" stroke="#ffffff" stroke-width="2" />
    <line x1="-15" y1="-5" x2="15" y2="-5" stroke="#ffffff" stroke-width="1.5" />
    <line x1="-15" y1="5" x2="15" y2="5" stroke="#ffffff" stroke-width="1.5" />
  </g>
  
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0f172a">Bioinformatics Workflows</text>
  <text x="200" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Reproducible &amp; Scalable Pipelines</text>
</svg>