  faq:
    - q: "Who is this mentorship for?"
      a: "This programme is designed for students, wet-lab researchers, and early-career scientists who want to learn bioinformatics, computational biology, and data science. Whether you are a complete beginner or looking to advance specific skills, the sessions are fully personalised to your level and goals."
    - q: "What happens in the first session?"
      a: "The first session is a discovery call where we discuss your background, learning goals, current projects, and challenges. Based on this, I create a customised learning roadmap for you before our next meeting."
    - q: "Do I need prior programming experience?"
      a: "No prior programming experience is required. I teach Python and R from the basics for beginners. If you already have experience, we can skip ahead and focus on advanced topics like multi-omics, machine learning, or workflow automation."
    - q: "How are sessions conducted?"
      a: "All sessions are conducted online via Zoom or Google Meet. I share my screen, live-code with you, and provide Jupyter notebooks or R Markdown files after each session for your reference."
    - q: "Can I cancel or pause my plan?"
      a: "Yes, you can cancel at any time. I recommend completing at least one month to see meaningful progress, but there is no long-term commitment required."
