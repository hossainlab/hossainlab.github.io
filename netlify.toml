[build]
  # Build command - use our custom build script
  command = "chmod +x build.sh && ./build.sh"

  # Output directory (where the rendered site is)
  publish = "docs"

  # Environment variables for build
  [build.environment]
    QUARTO_DENO = "true"
    QUARTO_DENO_V8_OPTIONS = "--max-heap-size=3000"
    QUARTO_R = "true"
    R_LIBS_USER = "/opt/R/library"

[build.processing]
  # Skip processing of some file types
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Redirect rules
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# Custom headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Form handling (if you have any contact forms)
# [[redirects]]
#   from = "/contact"
#   to = "/thanks"
#   status = 200
#   conditions = {Role = ["form-submission"]}

# 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404